<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — NURANIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --black: #0d0d0d; --white: #f8f8f6; --gray: #888; --light: #f0f0ee; --border: #e0e0de; --accent: #e8533a; --blue: #2b6cb0; --font-display: 'Barlow Condensed', sans-serif; --font-body: 'DM Sans', sans-serif; }
html { scroll-behavior: smooth; }
body { background: var(--white); color: var(--black); font-family: var(--font-body); overflow-x: hidden; }
.progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 9999; width: 0%; transition: width 0.4s ease; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 64px; background: var(--white); border-bottom: 1px solid var(--border); }
.nav-logo img { height: 32px; object-fit: contain; }
.nav-logo-text { font-family: var(--font-display); font-size: 1.5rem; font-weight: 900; letter-spacing: 0.1em; color: var(--black); text-decoration: none; }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { color: var(--black); text-decoration: none; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-right { display: flex; gap: 1rem; align-items: center; }
.cart-btn { background: var(--black); color: var(--white); padding: 0.5rem 1.2rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
.cart-btn:hover { background: var(--accent); }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--black); transition: all 0.3s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu { display: none; position: fixed; inset: 0; background: var(--white); z-index: 99; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; }
.mobile-menu.open { display: flex; }
.mobile-menu a { color: var(--black); text-decoration: none; font-family: var(--font-display); font-size: 2.5rem; font-weight: 900; text-transform: uppercase; transition: color 0.2s; }
.mobile-menu a:hover { color: var(--accent); }
.mobile-menu .m-cart { background: var(--black); color: var(--white) !important; padding: 0.8rem 3rem; }
.page-hero { margin-top: 64px; padding: 3rem 3rem 2rem; background: var(--black); color: var(--white); }
.page-tag { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
.page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 5rem); font-weight: 900; text-transform: uppercase; line-height: 0.9; }
.filter-bar { display: flex; gap: 0.5rem; padding: 1rem 3rem; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; background: var(--white); }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { background: none; border: 1px solid var(--border); color: var(--gray); padding: 0.4rem 1.2rem; font-family: var(--font-display); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
.filter-btn:hover, .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.shop-layout { display: grid; grid-template-columns: 220px 1fr; gap: 0; }
.filters { padding: 2rem; border-right: 1px solid var(--border); position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; }
.filter-section { margin-bottom: 2rem; }
.filter-title { font-family: var(--font-display); font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--black); margin-bottom: 0.8rem; font-weight: 700; }
.filter-options { display: flex; flex-direction: column; gap: 0.4rem; }
.side-btn { background: none; border: none; color: var(--gray); padding: 0.35rem 0; font-family: var(--font-body); font-size: 0.82rem; cursor: pointer; text-align: left; transition: color 0.2s; border-bottom: 1px solid transparent; }
.side-btn:hover, .side-btn.active { color: var(--black); font-weight: 500; }
.side-btn.active { border-bottom-color: var(--accent); color: var(--accent); }
.price-range { display: flex; flex-direction: column; gap: 0.6rem; }
.price-range input[type=range] { width: 100%; accent-color: var(--accent); }
.price-display { font-size: 0.78rem; color: var(--gray); }
.products-area { padding: 2rem; }
.sort-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 0.5rem; }
.sort-label { font-size: 0.78rem; color: var(--gray); }
.sort-select { background: var(--white); border: 1px solid var(--border); color: var(--black); padding: 0.4rem 0.8rem; font-family: var(--font-body); font-size: 0.78rem; cursor: pointer; }
.products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.product-card { background: var(--white); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid var(--border); }
.product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
.product-img { aspect-ratio: 1/1; background: var(--light); position: relative; overflow: hidden; }
.product-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.product-card:hover .product-img img { transform: scale(1.05); }
.product-img-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.3em; color: var(--border); text-transform: uppercase; }
.product-badge { position: absolute; top: 0.8rem; left: 0.8rem; background: var(--accent); color: var(--white); font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.6rem; z-index: 1; }
.product-badge.hot { background: var(--black); }
.product-badge.new { background: var(--blue); }
.product-overlay { position: absolute; inset: 0; background: rgba(13,13,13,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; z-index: 2; }
.product-card:hover .product-overlay { opacity: 1; }
.add-btn { background: var(--white); color: var(--black); border: none; padding: 0.7rem 1.5rem; font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.add-btn:hover { background: var(--accent); color: var(--white); }
.product-info { padding: 1rem; }
.product-cat { font-size: 0.62rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.2rem; }
.product-name { font-family: var(--font-display); font-size: 1rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.4rem; line-height: 1.1; }
.product-code { font-size: 0.62rem; color: var(--gray); font-family: monospace; margin-bottom: 0.3rem; }
.product-price { font-family: var(--font-display); font-size: 1.1rem; font-weight: 900; color: var(--black); }
.product-price s { color: var(--gray); font-weight: 400; font-size: 0.82rem; margin-left: 0.4rem; }
.mobile-add { display: none; width: 100%; background: var(--black); color: var(--white); border: none; padding: 0.6rem; font-family: var(--font-display); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 0; gap: 1rem; grid-column: 1/-1; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 0.75rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; }
.no-products { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--gray); }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; left: 1.5rem; background: var(--black); color: var(--white); padding: 0.9rem 1.5rem; font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; z-index: 9999; text-align: center; animation: fadeUp 0.3s ease; border-left: 3px solid var(--accent); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
footer { background: var(--black); color: var(--white); padding: 2rem 3rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
.footer-copy { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { font-size: 0.72rem; color: rgba(255,255,255,0.4); text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
.footer-links a:hover { color: var(--accent); }
@media (max-width: 900px) {
  nav { padding: 0 1.2rem; }
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .page-hero { padding: 2rem 1.2rem; }
  .filter-bar { padding: 0.8rem 1.2rem; }
  .shop-layout { grid-template-columns: 1fr; }
  .filters { display: none; }
  .products-area { padding: 1.2rem; }
  .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
  .product-overlay { display: none; }
  .mobile-add { display: block; }
  footer { padding: 1.5rem 1.2rem; }
}
</style>
</head>
<body>
<div class="progress-bar" id="progress-bar"></div>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html" onclick="closeMobileMenu()">Home</a>
  <a href="products.html" onclick="closeMobileMenu()">Shop</a>
  <a href="products.html?cat=shoes" onclick="closeMobileMenu()">Shoes</a>
  <a href="contact.html" onclick="closeMobileMenu()">Contact</a>
  <a href="cart.html" class="m-cart" id="mobile-cart-link">Cart (0)</a>
</div>
<nav>
  <a href="index.html" class="nav-logo">
    <img src="aigenmax_art-logo-1__10_.png" alt="NURANIQ" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="nav-logo-text" style="display:none">NURANIQ</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html" class="active">Shop All</a></li>
    <li><a href="products.html?cat=shoes">Shoes</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-right">
    <a href="cart.html" class="cart-btn" id="nav-cart">Cart (0)</a>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="page-hero">
  <p class="page-tag">NURANIQ Store</p>
  <h1 class="page-title">All Products</h1>
</div>
<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="shoes">Shoes</button>
  <button class="filter-btn" data-filter="shirts">T-Shirts</button>
  <button class="filter-btn" data-filter="bottoms">Bottoms</button>
  <button class="filter-btn" data-filter="hats">Hats</button>
  <button class="filter-btn" data-filter="jackets">Jackets</button>
  <button class="filter-btn" data-filter="accessories">Accessories</button>
</div>
<div class="shop-layout">
  <aside class="filters">
    <div class="filter-section">
      <p class="filter-title">Category</p>
      <div class="filter-options">
        <button class="side-btn active" data-side="all">All Products</button>
        <button class="side-btn" data-side="shoes">Shoes</button>
        <button class="side-btn" data-side="shirts">T-Shirts</button>
        <button class="side-btn" data-side="bottoms">Bottoms</button>
        <button class="side-btn" data-side="hats">Hats</button>
        <button class="side-btn" data-side="jackets">Jackets</button>
        <button class="side-btn" data-side="accessories">Accessories</button>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Max Price</p>
      <div class="price-range">
        <input type="range" min="500" max="10000" value="10000" step="100" id="price-filter">
        <p class="price-display">Up to ৳ <span id="price-val">10,000</span></p>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Availability</p>
      <div class="filter-options">
        <button class="side-btn active" data-stock="all">All Items</button>
        <button class="side-btn" data-stock="instock">In Stock Only</button>
      </div>
    </div>
  </aside>
  <div class="products-area">
    <div class="sort-bar">
      <p class="sort-label" id="showing-count">Showing all products</p>
      <select class="sort-select" id="sort-select">
        <option value="default">Sort: Default</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
      </select>
    </div>
    <div class="products-grid" id="products-grid">
      <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
    </div>
  </div>
</div>
<footer>
  <p class="footer-copy">© 2026 NURANIQ. All rights reserved.</p>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </div>
</footer>
<script>
const SHEET_ID = '1D-uqbXVDstQ8jktyzAu434FyMbFUUgoUgyOuBKWwWvk';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Products`;
function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('open'); document.getElementById('hamburger').classList.toggle('open'); }
function closeMobileMenu() { document.getElementById('mobile-menu').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); }
let cart = JSON.parse(localStorage.getItem('nuraniq_cart') || '[]');
function updateCartNav() { const c = cart.length; document.getElementById('nav-cart').textContent = `Cart (${c})`; const m = document.getElementById('mobile-cart-link'); if (m) m.textContent = `Cart (${c})`; }
updateCartNav();
function addToCart(p) { cart.push(p); localStorage.setItem('nuraniq_cart', JSON.stringify(cart)); updateCartNav(); const t = document.createElement('div'); t.className = 'toast'; t.textContent = `${p.name} added ✓`; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
let allProducts = [], activeCategory = 'all', activeStock = 'all', maxPrice = 10000;
async function fetchProducts() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows;
    if (!rows || rows.length === 0) { allProducts = []; renderProducts(); return; }
    allProducts = rows.map(row => ({ id: row.c[0]?.v||'', name: row.c[1]?.v||'', category: (row.c[2]?.v||'').toLowerCase().trim(), price: parseFloat(row.c[3]?.v)||0, old_price: parseFloat(row.c[4]?.v)||0, image: row.c[5]?.v||'', badge: (row.c[6]?.v||'').toLowerCase().trim(), stock: parseInt(row.c[7]?.v)||0 })).filter(p => p.name);
  } catch(e) { allProducts = []; }
  renderProducts();
}
function renderProducts() {
  const grid = document.getElementById('products-grid');
  let f = [...allProducts];
  if (activeCategory !== 'all') f = f.filter(p => p.category === activeCategory);
  if (activeStock === 'instock') f = f.filter(p => p.stock > 0);
  f = f.filter(p => p.price <= maxPrice);
  const sort = document.getElementById('sort-select').value;
  if (sort === 'price-low') f.sort((a,b) => a.price - b.price);
  if (sort === 'price-high') f.sort((a,b) => b.price - a.price);
  document.getElementById('showing-count').textContent = `Showing ${f.length} products`;
  if (!f.length) { grid.innerHTML = `<p class="no-products">No products found. Try adjusting filters.</p>`; return; }
  const bc = b => b === 'hot' ? 'hot' : b === 'new' ? 'new' : '';
  grid.innerHTML = f.map(p => `
    <div class="product-card" onclick="goToProduct('${p.id}')">
      <div class="product-img">
        ${p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy">` : '<div class="product-img-inner">NURANIQ</div>'}
        ${p.badge ? `<span class="product-badge ${bc(p.badge)}">${p.badge}</span>` : ''}
        <div class="product-overlay"><button class="add-btn" onclick='event.stopPropagation();addToCart(${JSON.stringify({id:p.id,name:p.name,price:p.price,category:p.category})})'>Add to Cart</button></div>
      </div>
      <div class="product-info">
        <p class="product-cat">${p.category}</p>
        <p class="product-name">${p.name}</p>
        <p class="product-code">#${p.id}</p>
        <p class="product-price">৳ ${p.price.toLocaleString()}${p.old_price ? ` <s>৳ ${p.old_price.toLocaleString()}</s>` : ''}</p>
      </div>
      <button class="mobile-add" onclick='event.stopPropagation();addToCart(${JSON.stringify({id:p.id,name:p.name,price:p.price,category:p.category})})'>Add to Cart</button>
    </div>`).join('');
}
document.querySelectorAll('[data-filter]').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active')); document.querySelectorAll('[data-side]').forEach(b => { if(b.dataset.side===btn.dataset.filter) b.classList.add('active'); else b.classList.remove('active'); }); btn.classList.add('active'); activeCategory = btn.dataset.filter; renderProducts(); }); });
document.querySelectorAll('[data-side]').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('[data-side]').forEach(b => b.classList.remove('active')); document.querySelectorAll('[data-filter]').forEach(b => { if(b.dataset.filter===btn.dataset.side) b.classList.add('active'); else b.classList.remove('active'); }); btn.classList.add('active'); activeCategory = btn.dataset.side; renderProducts(); }); });
document.querySelectorAll('[data-stock]').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('[data-stock]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); activeStock = btn.dataset.stock; renderProducts(); }); });
document.getElementById('price-filter').addEventListener('input', e => { maxPrice = parseInt(e.target.value); document.getElementById('price-val').textContent = maxPrice.toLocaleString(); renderProducts(); });
document.getElementById('sort-select').addEventListener('change', renderProducts);
function goToProduct(id) {
  const bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = '60%';
  setTimeout(() => window.location.href = `product.html?id=${id}`, 200);
}
const cat = new URLSearchParams(window.location.search).get('cat');
if (cat) { activeCategory = cat; document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter===cat)); document.querySelectorAll('[data-side]').forEach(b => b.classList.toggle('active', b.dataset.side===cat)); }
fetchProducts();
</script>
</body>
</html>
