<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — NURANIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #0d1f21;
    --white: #f0edee;
    --cream: #e4e1e2;
    --accent: #2c666e;
    --accent-dark: #1e474d;
    --gray: #7a8f91;
    --light-gray: #c4cfd0;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

  .cursor { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; }
  .cursor-follower { width: 36px; height: 36px; border: 1px solid var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: all 0.12s ease; mix-blend-mode: difference; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 4rem; }
  nav::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(13,31,33,0.95), transparent); pointer-events: none; }
  .nav-logo { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; letter-spacing: 0.2em; color: var(--white); text-decoration: none; position: relative; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; position: relative; }
  .nav-links a { color: var(--light-gray); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }
  .nav-actions { display: flex; gap: 1.5rem; align-items: center; position: relative; }
  .nav-actions a { color: var(--light-gray); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.3s; }
  .cart-btn { background: var(--accent); color: var(--white) !important; padding: 0.5rem 1.2rem; font-weight: 500 !important; transition: background 0.3s !important; }
  .cart-btn:hover { background: var(--accent-dark) !important; }

  .page-hero { padding: 10rem 4rem 4rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .page-hero-inner { display: flex; align-items: flex-end; justify-content: space-between; }
  .page-tag { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.8rem; }
  .page-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 800; line-height: 0.95; letter-spacing: -0.02em; }
  .product-count { font-size: 0.85rem; color: var(--gray); margin-bottom: 0.5rem; }

  .shop-layout { display: grid; grid-template-columns: 260px 1fr; gap: 3rem; padding: 3rem 4rem 6rem; }

  /* Filters */
  .filters { position: sticky; top: 6rem; height: fit-content; }
  .filter-section { margin-bottom: 2.5rem; }
  .filter-title { font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white); margin-bottom: 1rem; font-weight: 600; }
  .filter-options { display: flex; flex-direction: column; gap: 0.6rem; }
  .filter-btn { background: none; border: 0.5px solid rgba(255,255,255,0.1); color: var(--gray); padding: 0.5rem 1rem; font-family: var(--font-body); font-size: 0.8rem; letter-spacing: 0.05em; cursor: none; text-align: left; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(44,102,110,0.1); }
  .price-range { display: flex; flex-direction: column; gap: 0.8rem; }
  .price-range input[type=range] { width: 100%; accent-color: var(--accent); }
  .price-display { font-size: 0.8rem; color: var(--gray); }

  /* Products */
  .products-area {}
  .sort-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .sort-label { font-size: 0.8rem; color: var(--gray); }
  .sort-select { background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.4rem 1rem; font-family: var(--font-body); font-size: 0.8rem; cursor: none; }
  .sort-select option { background: var(--black); }

  .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }

  .product-card { cursor: none; }
  .product-img { aspect-ratio: 3/4; background: #111e20; position: relative; overflow: hidden; margin-bottom: 1rem; }
  .product-img::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #162c2f, #0d1f21); }
  .product-img-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 0.3em; color: rgba(44,102,110,0.3); text-transform: uppercase; }
  .product-badge { position: absolute; top: 1rem; left: 1rem; background: var(--accent); color: var(--white); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.25rem 0.6rem; z-index: 1; }
  .product-overlay { position: absolute; inset: 0; background: rgba(13,31,33,0.8); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; z-index: 2; }
  .product-card:hover .product-overlay { opacity: 1; }
  .product-card:hover .product-img { transform: scale(1.02); transition: transform 0.4s ease; }
  .add-btn { background: var(--accent); color: var(--white); border: none; padding: 0.8rem 1.8rem; font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: none; transition: background 0.3s; }
  .add-btn:hover { background: var(--white); color: var(--black); }
  .product-cat { font-size: 0.7rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
  .product-name { font-family: var(--font-display); font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; }
  .product-code { font-size: 0.7rem; color: var(--gray); margin-bottom: 0.4rem; font-family: monospace; letter-spacing: 0.05em; }
  .product-price { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--accent); }
  .product-price s { color: var(--gray); font-weight: 400; font-size: 0.85rem; margin-left: 0.5rem; }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6rem 0; gap: 1rem; grid-column: 1/-1; }
  .loading-spinner { width: 32px; height: 32px; border: 2px solid rgba(44,102,110,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 0.8rem; color: var(--gray); letter-spacing: 0.1em; text-transform: uppercase; }

  .no-products { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--gray); font-size: 0.9rem; }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--accent); color: var(--white); padding: 0.8rem 1.5rem; font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; z-index: 9999; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  footer { background: #060e0f; padding: 3rem 4rem; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 0.75rem; color: var(--gray); }
  .footer-links { display: flex; gap: 2rem; }
  .footer-links a { font-size: 0.75rem; color: var(--gray); text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; }
  .footer-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="follower"></div>

<nav>
  <a href="index.html" class="nav-logo">NUR<span>A</span>NIQ</a>
  <ul class="nav-links">
    <li><a href="index.html#new">New In</a></li>
    <li><a href="products.html" class="active">Products</a></li>
    <li><a href="products.html?cat=shoes">Shoes</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-actions">
    <a href="cart.html" class="cart-btn" id="nav-cart">Cart (0)</a>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <div>
      <p class="page-tag">NURANIQ Collection</p>
      <h1 class="page-title">All Products</h1>
    </div>
    <p class="product-count" id="product-count">Loading products...</p>
  </div>
</div>

<div class="shop-layout">
  <!-- Filters -->
  <aside class="filters">
    <div class="filter-section">
      <p class="filter-title">Category</p>
      <div class="filter-options" id="category-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="shirts">Shirts</button>
        <button class="filter-btn" data-filter="bottoms">Bottoms</button>
        <button class="filter-btn" data-filter="shoes">Shoes</button>
        <button class="filter-btn" data-filter="tops">Tops</button>
        <button class="filter-btn" data-filter="jackets">Jackets</button>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Max Price</p>
      <div class="price-range">
        <input type="range" min="500" max="10000" value="10000" step="100" id="price-filter">
        <p class="price-display">Up to ৳ <span id="price-val">10,000</span></p>
      </div>
    </div>
    <div class="filter-section">
      <p class="filter-title">Availability</p>
      <div class="filter-options">
        <button class="filter-btn active" data-stock="all">All Items</button>
        <button class="filter-btn" data-stock="instock">In Stock Only</button>
      </div>
    </div>
  </aside>

  <!-- Products -->
  <div class="products-area">
    <div class="sort-bar">
      <p class="sort-label" id="showing-count">Showing all products</p>
      <select class="sort-select" id="sort-select">
        <option value="default">Sort: Default</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="newest">Newest First</option>
      </select>
    </div>
    <div class="products-grid" id="products-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading products...</p>
      </div>
    </div>
  </div>
</div>

<footer>
  <p class="footer-copy">© 2026 NURANIQ. All rights reserved.</p>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </div>
</footer>

<script>
  const SHEET_ID = '1D-uqbXVDstQ8jktyzAu434FyMbFUUgoUgyOuBKWwWvk';
  const SHEET_NAME = 'Products';
  const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

  // Cursor
  const cursor = document.getElementById('cursor');
  const follower = document.getElementById('follower');
  let mx = 0, my = 0, fx = 0, fy = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx - 5 + 'px'; cursor.style.top = my - 5 + 'px';
  });
  function animFollower() {
    fx += (mx - fx - 18) * 0.12; fy += (my - fy - 18) * 0.12;
    follower.style.left = fx + 'px'; follower.style.top = fy + 'px';
    requestAnimationFrame(animFollower);
  }
  animFollower();

  // Cart
  let cart = JSON.parse(localStorage.getItem('nuraniq_cart') || '[]');
  function updateCartNav() {
    document.getElementById('nav-cart').textContent = `Cart (${cart.length})`;
  }
  updateCartNav();

  function addToCart(product) {
    cart.push(product);
    localStorage.setItem('nuraniq_cart', JSON.stringify(cart));
    updateCartNav();
    showToast(`${product.name} added ✓`);
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }

  // Sample fallback products (shown if sheet is empty)
  const sampleProducts = [
    { id: 'NRQ001', name: 'Oversized Linen Shirt', category: 'shirts', price: 2200, old_price: 2800, badge: 'New', stock: 10 },
    { id: 'NRQ002', name: 'Slim Cargo Pants', category: 'bottoms', price: 3100, old_price: '', badge: 'Hot', stock: 8 },
    { id: 'NRQ003', name: 'Low Top Sneakers', category: 'shoes', price: 4500, old_price: '', badge: '', stock: 5 },
    { id: 'NRQ004', name: 'Essential Tee Pack', category: 'tops', price: 1800, old_price: 2400, badge: 'Sale', stock: 15 },
    { id: 'NRQ005', name: 'Relaxed Chinos', category: 'bottoms', price: 2800, old_price: '', badge: '', stock: 7 },
    { id: 'NRQ006', name: 'Leather Derby Shoes', category: 'shoes', price: 5500, old_price: 6500, badge: 'Sale', stock: 3 },
  ];

  let allProducts = [];
  let activeCategory = 'all';
  let activeStock = 'all';
  let maxPrice = 10000;

  // Fetch from Google Sheets
  async function fetchProducts() {
    try {
      const res = await fetch(API_URL);
      const text = await res.text();
      const json = JSON.parse(text.substr(47).slice(0, -2));
      const rows = json.table.rows;

      if (!rows || rows.length === 0) {
        allProducts = sampleProducts;
      } else {
        allProducts = rows.map(row => ({
          id: row.c[0]?.v || '',
          name: row.c[1]?.v || '',
          category: (row.c[2]?.v || '').toLowerCase(),
          price: parseFloat(row.c[3]?.v) || 0,
          old_price: parseFloat(row.c[4]?.v) || '',
          image: row.c[5]?.v || '',
          badge: row.c[6]?.v || '',
          stock: parseInt(row.c[7]?.v) || 0,
        })).filter(p => p.name);
      }
    } catch (e) {
      allProducts = sampleProducts;
    }
    renderProducts();
  }

  function renderProducts() {
    const grid = document.getElementById('products-grid');
    let filtered = [...allProducts];

    if (activeCategory !== 'all') filtered = filtered.filter(p => p.category === activeCategory);
    if (activeStock === 'instock') filtered = filtered.filter(p => p.stock > 0);
    filtered = filtered.filter(p => p.price <= maxPrice);

    const sort = document.getElementById('sort-select').value;
    if (sort === 'price-low') filtered.sort((a, b) => a.price - b.price);
    if (sort === 'price-high') filtered.sort((a, b) => b.price - a.price);

    document.getElementById('product-count').textContent = `${filtered.length} Products`;
    document.getElementById('showing-count').textContent = `Showing ${filtered.length} products`;

    if (filtered.length === 0) {
      grid.innerHTML = `<p class="no-products">No products found. Try adjusting filters.</p>`;
      return;
    }

    grid.innerHTML = filtered.map(p => `
      <div class="product-card">
        <div class="product-img">
          ${p.image ? `<img src="${p.image}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" alt="${p.name}">` : '<div class="product-img-inner">NURANIQ</div>'}
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
          <div class="product-overlay">
            <button class="add-btn" onclick='addToCart(${JSON.stringify({id: p.id, name: p.name, price: p.price, category: p.category})})'>Add to Cart</button>
          </div>
        </div>
        <p class="product-cat">${p.category}</p>
        <p class="product-name">${p.name}</p>
        <p class="product-code">#${p.id}</p>
        <p class="product-price">৳ ${p.price.toLocaleString()} ${p.old_price ? `<s>৳ ${p.old_price.toLocaleString()}</s>` : ''}</p>
      </div>
    `).join('');
  }

  // Filter events
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.filter;
      renderProducts();
    });
  });

  document.querySelectorAll('[data-stock]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-stock]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStock = btn.dataset.stock;
      renderProducts();
    });
  });

  document.getElementById('price-filter').addEventListener('input', e => {
    maxPrice = parseInt(e.target.value);
    document.getElementById('price-val').textContent = parseInt(maxPrice).toLocaleString();
    renderProducts();
  });

  document.getElementById('sort-select').addEventListener('change', renderProducts);

  // Check URL for category param
  const urlParams = new URLSearchParams(window.location.search);
  const catParam = urlParams.get('cat');
  if (catParam) {
    activeCategory = catParam;
    document.querySelectorAll('[data-filter]').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === catParam);
    });
  }

  fetchProducts();
</script>
</body>
</html>
